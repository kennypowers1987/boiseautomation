<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Clean "BA" Corporate Logo with Split Ring -->
  <rect width="100" height="100" rx="20" fill="#0f172a" />
  
  <!-- Left half of the ring (Blue) -->
  <path d="M 50 15 A 35 35 0 0 0 50 85" fill="none" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
  
  <!-- Right half of the ring (White) -->
  <path d="M 50 15 A 35 35 0 0 1 50 85" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />

  <text 
    x="50" 
    y="66" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="44" 
    font-weight="bold" 
    text-anchor="middle" 
    letter-spacing="-1"
  >
    <tspan fill="#ffffff">B</tspan><tspan fill="#38bdf8">A</tspan>
  </text>
</svg>